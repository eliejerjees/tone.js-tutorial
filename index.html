<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Synth</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 40px;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 16px;
            margin-top: 10px;
            cursor: pointer;
        }

        #note-display {
            margin-top: 20px;
            padding: 20px;
            border: 1px solid #999;
            text-align: center;
            font-size: 28px;
            background-color: #fafafa;
        }

        #note-info {
            margin-top: 10px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Keyboard Synth</h1>

        <button id="start-btn">
            Start Audio
        </button>

        <div id="note-display">
            -
        </div>
    </div>

    <script src="audiokeys.min.js"></script>
    <script src="https://unpkg.com/tone"></script>
    <script src="app.js"></script>

</body>
</html>
